<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Cyber Sec Project</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
    <main class="shell">
        <section class="grid nav-section">
            <article class="card" style="grid-column: span 3; max-width: 600px; margin: 0 auto;">
                <div class="card-header">
                    <h2>Login</h2>
                    <p>Try the vulnerable and secure versions side by side.</p>
                </div>
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}
                <form action="/login" method="POST" class="form compact" style="margin-bottom: 2rem;">
                    <h3>Vulnerable login</h3>
                    <input type="hidden" name="type" value="vulnerable">
                    <label>
                        Username
                        <input name="username" type="text" required />
                    </label>
                    <label>
                        Password
                        <input name="password" type="password" required />
                    </label>
                    <button type="submit" class="secondary">Login vulnerable</button>
                </form>
                <form action="/login" method="POST" class="form compact">
                    <h3>Secure login</h3>
                    <input type="hidden" name="type" value="secure">
                    <label>
                        Username
                        <input name="username" type="text" required />
                    </label>
                    <label>
                        Password
                        <input name="password" type="password" required />
                    </label>
                    <button type="submit">Login secure</button>
                </form>
                <a href="/" style="display: block; text-align: center; margin-top: 1rem; color: white;">Back to Home</a>
            </article>
        </section>
    </main>
</body>
</html>
